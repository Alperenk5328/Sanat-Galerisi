{% extends "base.html" %}

{% block title %}Destek Talebi Oluştur - Online Sanat Galerisi{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Yeni Destek Talebi</h4>
                <a href="{{ url_for('my_tickets') }}" class="btn btn-outline-secondary btn-sm">Taleplerimi Gör</a>
            </div>
            <div class="card-body">
                <form action="{{ url_for('support') }}" method="POST">
                    <div class="mb-3">
                        <label for="subject" class="form-label">Konu</label>
                        <input type="text" class="form-control" id="subject" name="subject" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="priority" class="form-label">Öncelik</label>
                        <select class="form-select" id="priority" name="priority" required>
                            <option value="low">Düşük</option>
                            <option value="medium" selected>Normal</option>
                            <option value="high">Yüksek</option>
                            <option value="urgent">Acil</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="message" class="form-label">Mesajınız</label>
                        <textarea class="form-control" id="message" name="message" rows="5" required placeholder="Size nasıl yardımcı olabiliriz?"></textarea>
                    </div>
                    
                    <div class="text-end">
                        <button type="submit" class="btn btn-primary">Talebi Gönder</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
