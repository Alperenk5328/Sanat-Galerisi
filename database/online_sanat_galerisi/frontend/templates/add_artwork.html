{% extends "base.html" %}

{% block title %}Yeni Eser Ekle - Online Sanat Galerisi{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header">
                    <h4>Yeni Eser Ekle</h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('add_artwork') }}">
                        <div class="mb-3">
                            <label class="form-label">Başlık</label>
                            <input type="text" name="title" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Açıklama</label>
                            <textarea name="description" class="form-control" rows="4" required></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Fiyat (TL)</label>
                                <input type="number" step="0.01" name="price" class="form-control" value="0.00" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Kategori</label>
                                <select name="category_id" class="form-select" required>
                                    <option value="">Kategori seçin...</option>
                                    {% for category in categories %}
                                    <option value="{{ category.id }}">{{ category.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Görsel Dosya Adı</label>
                            <input type="text" name="image_url" class="form-control" placeholder="örnek: eser.jpg">
                            <div class="form-text">Bu dosya adı frontend/static/images/artworks içinde mevcut olmalı.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Etiketler</label>
                            <input type="text" name="tags" class="form-control" placeholder="resim, soyut, yağlı boya">
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Eseri Gönder</button>
                            <a href="{{ url_for('profile') }}" class="btn btn-outline-secondary">İptal</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
